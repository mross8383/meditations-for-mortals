<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3a4a3a">
<title>Not found — Meditations for Mortals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --moss: #4a5d3a;
    --moss-deep: #3a4a2c;
    --clay: #a67856;
    --terracotta: #b86b4a;
    --cream: #f4ede0;
    --paper: #ede4d3;
    --sand: #d9ccb0;
    --ink: #2a2419;
    --ink-soft: #4a3f30;
    --bark-deep: #3d2e20;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(at 20% 30%, rgba(74, 93, 58, 0.08) 0px, transparent 50%),
      radial-gradient(at 80% 70%, rgba(166, 120, 86, 0.08) 0px, transparent 50%);
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    opacity: 0.4;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.2 0 0 0 0 0.18 0 0 0 0 0.12 0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  .wrap {
    max-width: 480px;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--moss);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .eyebrow::before,
  .eyebrow::after {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--moss);
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: clamp(40px, 10vw, 64px);
    line-height: 1.05;
    color: var(--bark-deep);
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }
  h1 em {
    font-style: italic;
    color: var(--moss-deep);
    font-weight: 300;
  }
  p {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 17px;
    color: var(--ink-soft);
    line-height: 1.6;
    margin-bottom: 28px;
  }
  a.btn {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cream);
    background: var(--moss-deep);
    padding: 14px 24px;
    text-decoration: none;
    border-radius: 3px;
    transition: background 0.2s;
  }
  a.btn:hover, a.btn:active { background: var(--moss); }
  .footer-note {
    margin-top: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">404</div>
    <h1>This page<br>does not <em>exist</em></h1>
    <p>Which is fine. Most things don't.<br>The page you were looking for either moved or was never here.</p>
    <a href="/" class="btn">Return to the beginning</a>
    <div class="footer-note">Meditations for Mortals</div>
  </div>
</body>
</html>
