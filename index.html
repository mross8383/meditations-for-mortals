<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3a4a3a">
<title>Meditations for Mortals — A 28-Day Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --moss: #4a5d3a;
    --moss-deep: #3a4a2c;
    --moss-soft: #6b7a52;
    --olive: #8a8a5c;
    --clay: #a67856;
    --terracotta: #b86b4a;
    --bark: #5c4530;
    --bark-deep: #3d2e20;
    --cream: #f4ede0;
    --paper: #ede4d3;
    --sand: #d9ccb0;
    --ink: #2a2419;
    --ink-soft: #4a3f30;
    --rust: #8b4513;
    --shadow: rgba(58, 46, 32, 0.12);
    --shadow-deep: rgba(58, 46, 32, 0.25);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html {
    -webkit-text-size-adjust: 100%;
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.6;
    min-height: 100vh;
    background-image: 
      radial-gradient(at 20% 30%, rgba(74, 93, 58, 0.08) 0px, transparent 50%),
      radial-gradient(at 80% 70%, rgba(166, 120, 86, 0.08) 0px, transparent 50%),
      radial-gradient(at 50% 90%, rgba(92, 69, 48, 0.06) 0px, transparent 50%);
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* Subtle grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    opacity: 0.4;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.2 0 0 0 0 0.18 0 0 0 0 0.12 0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 80px;
    position: relative;
    z-index: 2;
  }

  /* ========== HEADER ========== */
  header {
    margin-bottom: 32px;
    padding-bottom: 28px;
    border-bottom: 1px solid rgba(58, 46, 32, 0.15);
    position: relative;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--moss);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .eyebrow::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--moss);
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: clamp(34px, 8vw, 48px);
    line-height: 1.05;
    color: var(--bark-deep);
    letter-spacing: -0.02em;
    font-variation-settings: 'opsz' 144;
    margin-bottom: 12px;
  }

  h1 em {
    font-style: italic;
    color: var(--moss-deep);
    font-weight: 300;
  }

  .subtitle {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 16px;
    color: var(--ink-soft);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .attribution {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    opacity: 0.7;
    text-transform: uppercase;
  }

  /* ========== PROGRESS ========== */
  .progress-block {
    background: var(--cream);
    border: 1px solid rgba(58, 46, 32, 0.12);
    border-radius: 4px;
    padding: 18px 20px;
    margin-bottom: 36px;
    position: relative;
  }

  .progress-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
    background: var(--moss);
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
    gap: 12px;
  }

  .progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .progress-count {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--bark-deep);
  }

  .progress-count span {
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 400;
  }

  .progress-bar {
    height: 3px;
    background: rgba(58, 46, 32, 0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--moss-deep), var(--moss), var(--olive));
    width: 0%;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .reset-btn {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 10px;
    padding: 4px 0;
    opacity: 0.5;
    transition: opacity 0.2s;
  }

  .reset-btn:hover, .reset-btn:active {
    opacity: 1;
    color: var(--terracotta);
  }

  /* ========== WEEKS ========== */
  .week {
    margin-bottom: 18px;
    background: var(--cream);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 1px 3px var(--shadow);
    border: 1px solid rgba(58, 46, 32, 0.08);
  }

  .week-header {
    padding: 22px 20px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(135deg, var(--cream) 0%, var(--paper) 100%);
    transition: background 0.3s;
    user-select: none;
    -webkit-user-select: none;
  }

  .week-header:active {
    background: var(--sand);
  }

  .week-header-content {
    flex: 1;
  }

  .week-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--moss);
    margin-bottom: 6px;
    display: block;
  }

  .week-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--bark-deep);
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }

  .week-subtitle {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 300;
  }

  .week-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    margin-left: 16px;
  }

  .week-progress {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--moss-deep);
    font-weight: 500;
  }

  .chevron {
    width: 12px;
    height: 12px;
    border-right: 1.5px solid var(--bark);
    border-bottom: 1.5px solid var(--bark);
    transform: rotate(45deg);
    transition: transform 0.3s ease;
    margin-bottom: 4px;
  }

  .week.open .chevron {
    transform: rotate(-135deg);
    margin-bottom: -2px;
  }

  .week-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .week.open .week-body {
    max-height: 20000px;
  }

  /* ========== DAYS ========== */
  .day {
    border-top: 1px solid rgba(58, 46, 32, 0.08);
  }

  .day-header {
    padding: 16px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(244, 237, 224, 0.4);
    transition: background 0.2s;
    user-select: none;
    -webkit-user-select: none;
  }

  .day-header:active {
    background: var(--paper);
  }

  .day-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--moss);
    width: 28px;
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }

  .day-title-wrap {
    flex: 1;
    min-width: 0;
  }

  .day-title {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--bark-deep);
    line-height: 1.3;
    letter-spacing: -0.005em;
  }

  .day-status {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--moss-soft);
    flex-shrink: 0;
    transition: all 0.3s;
    position: relative;
  }

  .day.completed .day-status {
    background: var(--moss);
    border-color: var(--moss-deep);
  }

  .day.completed .day-status::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%) rotate(45deg);
    width: 4px;
    height: 7px;
    border-right: 1.5px solid var(--cream);
    border-bottom: 1.5px solid var(--cream);
  }

  .day-chevron {
    width: 8px;
    height: 8px;
    border-right: 1.2px solid var(--ink-soft);
    border-bottom: 1.2px solid var(--ink-soft);
    transform: rotate(45deg);
    transition: transform 0.3s;
    opacity: 0.5;
    flex-shrink: 0;
  }

  .day.open .day-chevron {
    transform: rotate(-135deg);
  }

  .day-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    background: var(--paper);
  }

  .day.open .day-body {
    max-height: 3000px;
  }

  .day-content {
    padding: 4px 20px 24px;
  }

  /* ========== CONTENT BLOCKS ========== */
  .key-idea {
    background: linear-gradient(135deg, var(--moss-deep), var(--moss));
    color: var(--cream);
    padding: 22px 22px 24px;
    border-radius: 4px;
    margin: 16px 0 20px;
    position: relative;
    overflow: hidden;
  }

  .key-idea::before {
    content: '"';
    position: absolute;
    top: -10px;
    right: 14px;
    font-family: 'Fraunces', serif;
    font-size: 100px;
    color: rgba(244, 237, 224, 0.12);
    line-height: 1;
  }

  .key-idea-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 10px;
  }

  .key-idea-text {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 400;
    line-height: 1.4;
    font-style: italic;
    letter-spacing: -0.01em;
    position: relative;
    z-index: 1;
  }

  .section {
    margin-bottom: 22px;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--moss-deep);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::before {
    content: '';
    width: 16px;
    height: 1px;
    background: var(--clay);
  }

  .section-text {
    font-size: 15px;
    line-height: 1.65;
    color: var(--ink);
  }

  .reflection {
    background: var(--sand);
    padding: 18px 20px;
    border-radius: 4px;
    border-left: 3px solid var(--clay);
  }

  .reflection .section-text {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--bark-deep);
    line-height: 1.5;
  }

  .action {
    background: rgba(74, 93, 58, 0.08);
    padding: 18px 20px;
    border-radius: 4px;
    border-left: 3px solid var(--moss);
  }

  .action .section-text {
    color: var(--bark-deep);
    font-weight: 400;
  }

  /* ========== CHECKBOX ========== */
  .complete-toggle {
    margin-top: 24px;
    padding: 16px 20px;
    background: var(--cream);
    border: 1px dashed var(--moss-soft);
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.3s;
    user-select: none;
    -webkit-user-select: none;
  }

  .complete-toggle:active {
    background: var(--paper);
  }

  .day.completed .complete-toggle {
    background: rgba(74, 93, 58, 0.12);
    border-style: solid;
    border-color: var(--moss);
  }

  .checkbox {
    width: 22px;
    height: 22px;
    border: 1.5px solid var(--moss);
    border-radius: 3px;
    flex-shrink: 0;
    position: relative;
    background: var(--paper);
    transition: all 0.2s;
  }

  .day.completed .checkbox {
    background: var(--moss-deep);
    border-color: var(--moss-deep);
  }

  .day.completed .checkbox::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%) rotate(45deg);
    width: 6px;
    height: 11px;
    border-right: 2px solid var(--cream);
    border-bottom: 2px solid var(--cream);
  }

  .complete-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
  }

  .day.completed .complete-label {
    color: var(--moss-deep);
  }

  /* ========== JOURNAL ========== */
  .journal {
    margin-top: 22px;
    background: var(--cream);
    border: 1px solid rgba(58, 46, 32, 0.15);
    border-radius: 4px;
    padding: 16px 18px;
    position: relative;
  }

  .journal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .journal-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--bark);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .journal-label::before {
    content: '';
    width: 16px;
    height: 1px;
    background: var(--bark);
  }

  .journal-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--moss);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .journal-status.visible {
    opacity: 0.7;
  }

  .journal-textarea {
    width: 100%;
    min-height: 110px;
    background: var(--paper);
    border: 1px solid rgba(58, 46, 32, 0.1);
    border-radius: 3px;
    padding: 14px 14px;
    font-family: 'Fraunces', serif;
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink);
    resize: vertical;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  .journal-textarea:focus {
    outline: none;
    border-color: var(--moss);
    background: #fbf6ea;
  }

  .journal-textarea::placeholder {
    color: var(--ink-soft);
    opacity: 0.5;
    font-style: italic;
  }

  .journal-meta {
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    opacity: 0.6;
  }

  @media (min-width: 768px) {
    .journal-textarea { font-size: 16px; min-height: 130px; }
  }

  /* ========== FOOTER ========== */
  footer {
    margin-top: 60px;
    padding-top: 28px;
    border-top: 1px solid rgba(58, 46, 32, 0.15);
    text-align: center;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-soft);
    opacity: 0.7;
    line-height: 1.6;
  }

  footer .ornament {
    font-family: 'Fraunces', serif;
    color: var(--clay);
    margin: 0 8px;
  }

  /* ========== iPad / larger ========== */
  @media (min-width: 768px) {
    .container {
      padding: 48px 40px 100px;
    }
    h1 { font-size: 56px; }
    .subtitle { font-size: 18px; }
    .week-title { font-size: 26px; }
    .day-title { font-size: 17px; }
    .key-idea-text { font-size: 21px; }
    .reflection .section-text { font-size: 17px; }
    .section-text { font-size: 16px; }
  }

  /* iOS-friendly fix: prevent zoom on tap */
  button, .week-header, .day-header, .complete-toggle {
    touch-action: manipulation;
  }
</style>
</head>
<body>
<div class="container">

<header>
  <div class="eyebrow">A 28-Day Companion</div>
  <h1>Meditations<br>for <em>Mortals</em></h1>
  <p class="subtitle">Four weeks to embrace your limits and begin to live.</p>
  <div class="attribution">After Oliver Burkeman</div>
</header>

<div class="progress-block">
  <div class="progress-header">
    <span class="progress-label">Your Progress</span>
    <span class="progress-count"><span id="progress-num">0</span><span> / 28 days</span></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <button class="reset-btn" onclick="resetProgress()">Reset all progress</button>
</div>

<div id="weeks"></div>

<footer>
  You will die <span class="ornament">·</span> So might as well start now <span class="ornament">·</span>
</footer>

</div>

<script>
const data = [
  {
    week: 1,
    title: "Being Finite",
    subtitle: "Confronting the truth of limited time.",
    days: [
      {
        title: "It's worse than you think",
        idea: "You will not get on top of it all. Ever. The sooner you accept that, the sooner you can actually live.",
        summary: "The trap is believing that one day, with enough effort, you'll finally be 'caught up.' You won't. There will always be more demands than time. This isn't pessimism — it's the precondition for doing anything that matters. The relief, when it comes, is realising the goal was never achievable in the first place.",
        reflection: "What are you currently doing on the assumption that you'll soon reach a state of total control? What might shift if you accepted that state will never arrive?",
        action: "Today, pick one task on your list you've been telling yourself you 'should get to.' Either do it now in 20 minutes or less, or formally cross it off and accept it won't happen. No third option."
      },
      {
        title: "The Imperfectionist",
        idea: "You don't need to do everything well. You need to do something — imperfectly — and let that be enough.",
        summary: "Perfectionism is the friend of procrastination. It dresses itself up as high standards but functions as paralysis. The imperfectionist accepts that any output, while imperfect, beats the perfect output that never exists. This is not lowering the bar — it's recognising the bar was never real.",
        reflection: "Where is the desire to do something perfectly stopping you from doing it at all?",
        action: "Identify one thing you've been delaying because it isn't 'ready.' Send it, ship it, post it, or commit to it today in its current state."
      },
      {
        title: "You need only do the next right thing",
        idea: "You can't see the whole path. You don't need to. You only need to take the next step.",
        summary: "The mind craves a master plan — a guarantee that today's effort connects to tomorrow's outcome. That guarantee will never come. What you have is right now, and one decision in front of you. Trying to optimise the entire chain at once is what makes most days feel impossible before they've started.",
        reflection: "What single, small, defensible next action could you take today — without needing to know what comes after it?",
        action: "Write down the one next action for your most-avoided project. Just one. Then do only that."
      },
      {
        title: "Against productivity debt",
        idea: "Stop starting each day already in the red. You don't owe the universe a quota.",
        summary: "Most people open their eyes already feeling behind, as if there's a baseline of output owed before they're allowed to rest. There isn't. You wake up at zero, neither owing nor owed. Anything done today is added — not subtracted from a debt that doesn't exist.",
        reflection: "What would you do today if you genuinely believed you weren't behind on anything?",
        action: "Before checking any inbox or list today, write down 3 things — and only 3 — that would make today feel meaningful. Treat anything beyond those as a bonus."
      },
      {
        title: "Consume strategically",
        idea: "You will never read all the books, watch all the films, or follow all the news. Choose deliberately, then enjoy what you chose.",
        summary: "The internet has trained an anxious relationship with information — the sense that not knowing the latest thing is a failure. It isn't. Cultivating a smaller, deliberately-curated diet of things to read, listen to and watch will do more for your mind than chasing every new release.",
        reflection: "What are you consuming out of obligation or FOMO rather than genuine interest?",
        action: "Unsubscribe from 5 things today — newsletters, podcasts, channels, accounts. Don't replace them with anything."
      },
      {
        title: "Decision hygiene",
        idea: "Most of your stress comes from undecided decisions, not difficult ones.",
        summary: "An unmade decision drains energy continuously in the background. The decision itself, once made, almost always feels lighter than the limbo before it. The question is rarely 'what's the right answer' — more often it's 'am I willing to decide and live with it.'",
        reflection: "What decision have you been postponing? What is the cost of leaving it open?",
        action: "Pick one open decision and resolve it today — either way. Write it down. Move on."
      },
      {
        title: "The week as it actually is",

  },
  {

      {

        action: "Spend 5 minutes today on the thing you've been avoiding. Just 5. No expectation of progress. Then stop."

      {
        title: "Tomorrow you'll be a different person",
        idea: "The version of you who will deal with tomorrow's tasks doesn't yet exist. Stop pre-living their day.",

const STORAGE_KEY = 'meditations-mortals-progress-v1';
const JOURNAL_KEY = 'meditations-mortals-journals-v1';

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}

function saveProgress(p) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch (e) {}
}

let progress = loadProgress();

function loadJournals() {
  try {
    const raw = localStorage.getItem(JOURNAL_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}

function saveJournals(j) {
  try { localStorage.setItem(JOURNAL_KEY, JSON.stringify(j)); } catch (e) {}
}

let journals = loadJournals();

function dayKey(w, d) { return `w${w}d${d}`; }

function render() {
  const root = document.getElementById('weeks');
  root.innerHTML = '';
  data.forEach(week => {
    const completed = week.days.filter((_, i) => progress[dayKey(week.week, i+1)]).length;
    const weekEl = document.createElement('div');
    weekEl.className = 'week';
    weekEl.innerHTML = `
      <div class="week-header" onclick="toggleWeek(this)">
        <div class="week-header-content">
          <span class="week-number">Week ${String(week.week).padStart(2, '0')}</span>
          <div class="week-title">${week.title}</div>
          <div class="week-subtitle">${week.subtitle}</div>
        </div>
        <div class="week-meta">
          <div class="chevron"></div>
          <div class="week-progress">${completed}/7</div>
        </div>
      </div>
      <div class="week-body">
        ${week.days.map((day, i) => {
          const key = dayKey(week.week, i+1);
          const done = progress[key] ? 'completed' : '';
          return `
            <div class="day ${done}" data-key="${key}">
              <div class="day-header" onclick="toggleDay(this)">
                <span class="day-number">D${String((week.week-1)*7 + i + 1).padStart(2, '0')}</span>
                <div class="day-title-wrap">
                  <div class="day-title">${day.title}</div>
                </div>
                <div class="day-status"></div>
                <div class="day-chevron"></div>
              </div>
              <div class="day-body">
                <div class="day-content">
                  <div class="key-idea">
                    <div class="key-idea-label">Key Idea</div>
                    <div class="key-idea-text">${day.idea}</div>
                  </div>
                  <div class="section">
                    <div class="section-label">Summary</div>
                    <div class="section-text">${day.summary}</div>
                  </div>
                  <div class="section reflection">
                    <div class="section-label">Reflection</div>
                    <div class="section-text">${day.reflection}</div>
                  </div>
                  <div class="section action">
                    <div class="section-label">Practical Action</div>
                    <div class="section-text">${day.action}</div>
                  </div>
                  <div class="journal">
                    <div class="journal-header">
                      <div class="journal-label">Journal</div>
                      <div class="journal-status" id="status-${key}">Saved</div>
                    </div>
                    <textarea
                      class="journal-textarea"
                      id="journal-${key}"
                      data-key="${key}"
                      placeholder="Tasks, reflections, notes, what came up today…"
                      oninput="handleJournalInput(this)"
                    ></textarea>
                    <div class="journal-meta">
                      <span id="count-${key}">0 words</span>
                      <span id="updated-${key}"></span>
                    </div>
                  </div>
                  <div class="complete-toggle" onclick="toggleComplete(event, '${key}')">
                    <div class="checkbox"></div>
                    <div class="complete-label">Mark day complete</div>
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    root.appendChild(weekEl);
  });
  updateProgressBar();
  hydrateJournals();
}

function hydrateJournals() {
  Object.keys(journals).forEach(key => {
    const ta = document.getElementById(`journal-${key}`);
    if (ta && journals[key]) {
      ta.value = journals[key].text || '';
      updateJournalMeta(key);
    }
  });
}

function wordCount(s) {
  const t = s.trim();
  if (!t) return 0;
  return t.split(/\s+/).length;
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const opts = sameDay
    ? { hour: '2-digit', minute: '2-digit' }
    : { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' };
  return 'Saved ' + d.toLocaleString(undefined, opts);
}

function updateJournalMeta(key) {
  const ta = document.getElementById(`journal-${key}`);
  if (!ta) return;
  const wc = wordCount(ta.value);
  const cEl = document.getElementById(`count-${key}`);
  const uEl = document.getElementById(`updated-${key}`);
  if (cEl) cEl.textContent = `${wc} word${wc === 1 ? '' : 's'}`;
  if (uEl && journals[key]?.updated) uEl.textContent = formatTime(journals[key].updated);
}

const saveTimers = {};
function handleJournalInput(ta) {
  const key = ta.dataset.key;
  const text = ta.value;

  // immediate UI: word count
  const wc = wordCount(text);
  const cEl = document.getElementById(`count-${key}`);
  if (cEl) cEl.textContent = `${wc} word${wc === 1 ? '' : 's'}`;

  // debounce write
  clearTimeout(saveTimers[key]);
  saveTimers[key] = setTimeout(() => {
    if (text.trim()) {
      journals[key] = { text, updated: Date.now() };
    } else {
      delete journals[key];
    }
    saveJournals(journals);
    const uEl = document.getElementById(`updated-${key}`);
    if (uEl) uEl.textContent = journals[key] ? formatTime(journals[key].updated) : '';
    const status = document.getElementById(`status-${key}`);
    if (status) {
      status.classList.add('visible');
      clearTimeout(status._t);
      status._t = setTimeout(() => status.classList.remove('visible'), 1400);
    }
  }, 500);
}

function toggleWeek(el) {
  el.parentElement.classList.toggle('open');
}

function toggleDay(el) {
  el.parentElement.classList.toggle('open');
}

function toggleComplete(e, key) {
  e.stopPropagation();
  progress[key] = !progress[key];
  if (!progress[key]) delete progress[key];
  saveProgress(progress);
  
  const dayEl = document.querySelector(`[data-key="${key}"]`);
  dayEl.classList.toggle('completed');
  
  // update week count
  const weekNum = parseInt(key.match(/w(\d+)/)[1]);
  const week = data.find(w => w.week === weekNum);
  const completed = week.days.filter((_, i) => progress[dayKey(weekNum, i+1)]).length;
  const weekEl = dayEl.closest('.week');
  weekEl.querySelector('.week-progress').textContent = `${completed}/7`;
  
  updateProgressBar();
}

function updateProgressBar() {
  const total = Object.keys(progress).filter(k => progress[k]).length;
  document.getElementById('progress-num').textContent = total;
  document.getElementById('progress-fill').style.width = `${(total / 28) * 100}%`;
}

function resetProgress() {
  const wipeJournals = confirm('Reset all checkbox progress?\n\nClick OK to also wipe all journal entries.\nClick Cancel to keep journals (you\'ll then be asked to confirm checkbox reset only).');
  if (wipeJournals) {
    progress = {};
    journals = {};
    saveProgress(progress);
    saveJournals(journals);
    render();
    return;
  }
  if (confirm('Reset checkbox progress only? Journals will be kept.')) {
    progress = {};
    saveProgress(progress);
    render();
  }
}

render();

// Open week 1 by default on first load
if (Object.keys(progress).length === 0) {
  document.querySelector('.week')?.classList.add('open');
}
</script>
